    help_desc_filter_tasks: "チケットの題名に含まれるキーワードでタスクを素早く絞り込みます。ショートカットキー: Ctrl+F"
    help_desc_columns: "左側のタスク一覧に表示する列（ステータス、担当者、開始日、期日など）を選択します。"
    help_desc_assignee_filter: "特定の担当者でタスクを絞り込んだり、担当者ごとにタスクをグループ化して表示します。"
    help_desc_project_filter: "特定のプロジェクトでタスクを絞り込んだり、プロジェクトごとにタスクをグループ化して表示します。"
    help_desc_version_filter: "対象バージョンでタスクを絞り込んだり、バージョンの見出し行の表示/非表示を切り替えます。"
    help_desc_status_filter: "現在のステータス（新規、進行中、終了など）でタスクを絞り込みます。"
    help_desc_progress_line: "チャート上にイナズマ線を表示・非表示にし、タスクが予定より進んでいるか遅れているかを視覚化します。"
    help_desc_dependency_settings: "依存関係のデフォルト動作を設定します。関係種別、delay の自動計算、デフォルト依存関係の自動適用、自動スケジュール時の移動モードを切り替えられます。"
    help_desc_export: "現在のガント表示を PNG 画像として出力したり、表示中のタスクデータを親子関係列・依存関係列付きの CSV としてダウンロードしたりできます。"
