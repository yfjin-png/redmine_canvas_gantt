    help_desc_edit_query: "現在のクエリ条件を Redmine 標準のチケット一覧画面で編集します。共有フィルタの見直しや保存に使います。"
    help_desc_workload: "ワークロードパネルの表示を切り替え、1 日あたりの稼働上限、末端チケット限定、完了チケットを含めるか、今日以降のみを対象にするかを調整します。"
    help_desc_maximize_left: "チャートを隠してタスク一覧を画面いっぱいに広げます。もう一度クリックすると元の分割ビューに戻ります。"
